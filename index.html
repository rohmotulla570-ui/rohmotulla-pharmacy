<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>রহমত উল্লা ফার্মেসি</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 20px; }
        .card { background: white; padding: 15px; margin-bottom: 10px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input, select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { background: #065c39; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold; }
        nav { display: flex; gap: 10px; margin-bottom: 20px; }
    </style>
</head>
<body>

<nav>
    <button onclick="location.reload()">হোম (রিফ্রেশ)</button>
    <button style="background: #333;" onclick="document.getElementById('admin').style.display='block'; document.getElementById('home').style.display='none';">অ্যাডমিন</button>
</nav>

<div id="home">
    <input type="text" id="search" placeholder="খুঁজুন..." oninput="render()">
    <div id="list">লোড হচ্ছে...</div>
</div>

<div id="admin" style="display:none;">
    <div class="card">
        <h3>নতুন ওষুধ যোগ করুন</h3>
        <input id="n" placeholder="ওষুধের নাম (Brand)">
        <input id="g" placeholder="জেনেরিক নাম">
        <select id="c"><option>Analgesic</option><option>Antacid</option><option>Antibiotic</option><option>Other</option></select>
        <input id="p" type="number" placeholder="মূল্য">
        <input id="s" type="number" placeholder="স্টক">
        <button onclick="save()">সেভ করুন</button>
    </div>
</div>

<script>
const URL = 'https://tyinuznjbbzcjcgaotwm.supabase.co/rest/v1/medicines';
const KEY = 'EyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR5aW51em5qYmJ6Y2pjZ2FvdHdtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwMzIyNTQsImV4cCI6MjA5MjYwODI1NH0.Q7r8yIYiDJAbVyAwQvOk7XVKsFd2EvUYmeX6YwSGnYM';

const opt = { headers: { 'apikey': KEY, 'Authorization': 'Bearer ' + KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' } };

let meds = [];

async function load() {
    try {
        const r = await fetch(URL + '?select=*&order=brand.asc', opt);
        meds = await r.json();
        render();
    } catch(e) { document.getElementById('list').innerHTML = "লোড হয়নি। SQL রান করেছেন?"; }
}

function render() {
    const q = document.getElementById('search').value.toLowerCase();
    const f = meds.filter(m => m.brand.toLowerCase().includes(q) || m.generic.toLowerCase().includes(q));
    document.getElementById('list').innerHTML = f.map(m => `
        <div class="card">
            <b>${m.brand}</b> (${m.generic})<br>
            মূল্য: ৳${m.unit_price} | স্টক: ${m.stock}
        </div>`).join('');
}

async function save() {
    const data = {
        brand: document.getElementById('n').value,
        generic: document.getElementById('g').value,
        category: document.getElementById('c').value,
        unit_price: parseFloat(document.getElementById('p').value),
        stock: parseInt(document.getElementById('s').value || 0)
    };

    const r = await fetch(URL, { method: 'POST', ...opt, body: JSON.stringify(data) });
    if(r.ok) { alert('সেভ হয়েছে!'); location.reload(); } 
    else { alert('ভুল! SQL রান না করলে সেভ হবে না।'); }
}
load();
</script>
</body>
</html>
