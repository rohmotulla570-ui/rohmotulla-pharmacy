<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>রহমত উল্লা ফার্মেসি</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;700&display=swap');
        body { font-family: 'Hind Siliguri', sans-serif; background: #f0f7f4; padding: 15px; }
        .card { background: white; padding: 15px; margin-bottom: 12px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); border-left: 5px solid #065c39; }
        .brand { font-size: 18px; font-weight: 700; color: #065c39; }
        .generic { font-size: 14px; color: #555; font-style: italic; margin-top: 2px; }
        .price-stock { display: flex; justify-content: space-between; font-weight: 600; font-size: 14px; margin-top: 10px; padding-top: 8px; border-top: 1px solid #eee; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1.5px solid #d4e6dc; border-radius: 10px; outline: none; }
        button { background: #065c39; color: white; padding: 12px; border: none; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; }
        nav { display: flex; gap: 10px; margin-bottom: 20px; }
    </style>
</head>
<body>

<nav>
    <button onclick="location.reload()">হোম</button>
    <button style="background: #333;" onclick="document.getElementById('home').style.display='none'; document.getElementById('admin').style.display='block';">অ্যাডমিন</button>
</nav>

<div id="home">
    <input type="text" id="search" placeholder="ওষুধ বা জেনেরিক দিয়ে খুঁজুন..." oninput="render()">
    <div id="list">লোড হচ্ছে...</div>
</div>

<div id="admin" style="display:none;">
    <div class="card">
        <h3 style="text-align:center;">নতুন ওষুধ যোগ করুন</h3>
        <input id="n" placeholder="ওষুধের নাম (Brand)">
        <input id="g" placeholder="জেনেরিক নাম (Paracetamol)">
        <select id="c"><option>Analgesic</option><option>Antacid</option><option>Antibiotic</option><option>Other</option></select>
        <input id="p" type="number" step="0.01" placeholder="মূল্য (৳)">
        <input id="s" type="number" placeholder="স্টক পরিমাণ (শুধু সংখ্যা)">
        <button onclick="save()">সেভ করুন</button>
    </div>
</div>

<script>
const URL = 'https://tyinuznjbbzcjcgaotwm.supabase.co/rest/v1/medicines';
const KEY = 'EyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR5aW51em5qYmJ6Y2pjZ2FvdHdtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwMzIyNTQsImV4cCI6MjA5MjYwODI1NH0.Q7r8yIYiDJAbVyAwQvOk7XVKsFd2EvUYmeX6YwSGnYM';

const opt = { headers: { 'apikey': KEY, 'Authorization': 'Bearer ' + KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' } };

let meds = [];

async function load() {
    try {
        const r = await fetch(URL + '?select=*&order=brand.asc', opt);
        meds = await r.json();
        render();
    } catch(e) { document.getElementById('list').innerHTML = "লোড হয়নি।"; }
}

function render() {
    const q = document.getElementById('search').value.toLowerCase();
    const f = meds.filter(m => (m.brand||'').toLowerCase().includes(q) || (m.generic||'').toLowerCase().includes(q));
    document.getElementById('list').innerHTML = f.map(m => `
        <div class="card">
            <div class="brand">${m.brand}</div>
            <div class="generic">${m.generic || 'জেনেরিক নেই'}</div>
            <div class="price-stock">
                <span>মূল্য: ৳${m.unit_price}</span>
                <span style="color: ${m.stock > 0 ? '#2d6a4f' : '#c00'}">স্টক: ${m.stock}</span>
            </div>
        </div>`).join('');
}

async function save() {
    const name = document.getElementById('n').value.trim();
    const generic = document.getElementById('g').value.trim();
    const price = parseFloat(document.getElementById('p').value);
    const stock = parseInt(document.getElementById('s').value);

    if(!name || !generic || isNaN(price) || isNaN(stock)) { 
        alert('দয়া করে সব ঘর সঠিক সংখ্যা দিয়ে পূরণ করুন!'); 
        return; 
    }

    const data = { brand: name, generic: generic, category: document.getElementById('c').value, unit_price: price, stock: stock };

    const r = await fetch(URL, { method: 'POST', ...opt, body: JSON.stringify(data) });
    if(r.ok) { alert('✅ সফলভাবে সেভ হয়েছে!'); location.reload(); } 
    else { alert('সেভ করতে সমস্যা হয়েছে। ডাটাবেস টেবিল চেক করুন।'); }
}
load();
</script>
</body>
</html>
