<script>
// ১. আপনার তথ্যগুলো আমি এখানে বসিয়ে দিয়েছি (Key টি শুধু চেক করে নিন)
const SB_URL = 'https://tyinuznjbbzcjcgaotwm.supabase.co';
const SB_KEY = 'আপনার_কপি_করা_ANON_KEY_এখানে_বসান'; // এখানে আপনার সেই বড় Key-টি পেস্ট করুন

const HEADERS = {
  'apikey': SB_KEY,
  'Authorization': `Bearer ${SB_KEY}`,
  'Content-Type': 'application/json',
  'Prefer': 'return=minimal'
};

let allMedicines = [];
let currentCategory = 'All';

// ২. ডাটাবেস থেকে ওষুধ লোড করার ফাংশন
async function loadMedicines() {
  try {
    const res = await fetch(`${SB_URL}/rest/v1/medicines?select=*&order=brand.asc`, { headers: HEADERS });
    allMedicines = await res.json();
    renderCategories();
    filterMedicines();
  } catch(e) { console.error("Load Error:", e); }
}

// ৩. নতুন ওষুধ যোগ বা এডিট করা
async function saveMedicine() {
  const brand = document.getElementById('f_brand').value.trim();
  const generic = document.getElementById('f_generic').value.trim();
  const price = document.getElementById('f_price').value;
  const editId = document.getElementById('editId').value;

  if(!brand || !generic || !price) {
    showMsg('❌ ব্র্যান্ড, জেনেরিক ও মূল্য আবশ্যক!', 'error');
    return;
  }

  const body = {
    brand, generic,
    category: document.getElementById('f_cat').value,
    manufacturer: document.getElementById('f_mfr').value,
    unit_price: parseFloat(price),
    bulk_price: parseFloat(document.getElementById('f_bulk').value || price),
    stock: parseInt(document.getElementById('f_stock').value || 0),
    requires_rx: parseInt(document.getElementById('f_rx').value),
    description: document.getElementById('f_desc').value,
    side_effects: document.getElementById('f_side').value,
    storage: document.getElementById('f_storage').value
  };

  try {
    let url = `${SB_URL}/rest/v1/medicines`;
    let method = 'POST';
    if (editId) { url = `${url}?id=eq.${editId}`; method = 'PATCH'; }

    const res = await fetch(url, { method, headers: HEADERS, body: JSON.stringify(body) });
    if(res.ok) {
      showMsg(editId ? '✅ আপডেট হয়েছে!' : '✅ যোগ হয়েছে!', 'success');
      resetForm();
      await loadMedicines();
      renderAdminTable();
    }
  } catch(e) { showMsg('❌ ত্রুটি হয়েছে!', 'error'); }
}

// ৪. ওষুধ মুছে ফেলা
async function deleteMedicine(id) {
  if(!confirm('এই ওষুধটি মুছে ফেলবেন?')) return;
  try {
    const res = await fetch(`${SB_URL}/rest/v1/medicines?id=eq.${id}`, { method: 'DELETE', headers: HEADERS });
    if(res.ok) {
      showMsg('🗑️ মুছে ফেলা হয়েছে।', 'success');
      await loadMedicines();
      renderAdminTable();
    }
  } catch(e) { showMsg('❌ ত্রুটি হয়েছে।', 'error'); }
}

// --- আপনার আগের রেন্ডারিং ফাংশনগুলো এখানে থাকবে ---
// (renderCategories, filterMedicines, renderCards, openModal, renderInventory, renderAdminTable, resetForm, showMsg)
// আমি এগুলো আপনার আগের দেওয়া কোড থেকে নিতে বলছি যাতে ডিজাইন ঠিক থাকে।

// পেজ দেখানোর ফাংশন
function showPage(name) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  if(event) event.target.classList.add('active');
  if(name==='inventory') renderInventory();
  if(name==='admin') renderAdminTable();
}

function renderCategories() {
  const wrap = document.getElementById('categoryFilters');
  const cats = ['All',...new Set(allMedicines.map(m=>m.category))];
  wrap.innerHTML = cats.map(c=>`<button class="filter-btn ${c===currentCategory?'active':''}" onclick="setCategory('${c}')">${c}</button>`).join('');
}

function setCategory(cat) { currentCategory = cat; renderCategories(); filterMedicines(); }

function filterMedicines() {
  const q = (document.getElementById('searchInput').value||'').toLowerCase();
  const filtered = allMedicines.filter(m=>{
    const mq = !q || m.brand.toLowerCase().includes(q) || m.generic.toLowerCase().includes(q);
    const mc = currentCategory==='All' || m.category===currentCategory;
    return mq && mc;
  });
  renderCards(filtered);
}

// ... (বাকি রেন্ডারিং কোডগুলো হুবহু আগের মতো থাকবে) ...

loadMedicines(); // অ্যাপ চালুর সময় ডাটা লোড করা
    </script>
